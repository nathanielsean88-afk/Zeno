<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Zeno Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script async crossorigin="anonymous"
        src="https://real-liger-88.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
        data-clerk-publishable-key="pk_test_cmVhbC1saWdlci04OC5jbGVyay5hY2NvdW50cy5kZXYk">
    </script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 16px 32px;
        }
        .wrap {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
        }

        .back {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text2);
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 500;
            margin-bottom: 22px;
            transition: color 0.2s;
            letter-spacing: 0.1px;
        }
        .back:hover { color: var(--green-deep); }

        .card-header { text-align: center; margin-bottom: 26px; }
        .zn-logo { display: inline-flex; align-items: center; gap: 10px; margin-bottom: 16px; }
        .zn-logo-icon {
            width: 42px;
            height: 42px;
            background: var(--green);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'DM Serif Display', serif;
            font-size: 1.15rem;
            font-weight: 400;
            color: var(--text);
            box-shadow: 0 4px 16px rgba(175,200,173,0.4);
        }
        .zn-logo-text {
            font-family: 'DM Serif Display', serif;
            font-size: 1.3rem;
            font-weight: 400;
            color: var(--text);
        }
        .card-title {
            font-family: 'DM Serif Display', serif;
            font-size: 1.9rem;
            font-weight: 400;
            letter-spacing: -0.3px;
            margin-bottom: 5px;
            color: var(--text);
        }
        .card-sub { color: var(--text2); font-size: 0.88rem; }

        /* Clerk override */
        #clerk-signin {
            width: 100% !important;
            overflow: visible !important;
            box-sizing: border-box;
        }
        #clerk-signin * { box-sizing: border-box !important; }

        .cl-rootBox { width: 100% !important; max-width: 100% !important; overflow: visible !important; }
        .cl-card {
            width: 100% !important;
            max-width: 100% !important;
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
            border: none !important;
            overflow: visible !important;
        }
        .cl-cardBox { width: 100% !important; max-width: 100% !important; }
        .cl-main { width: 100% !important; padding: 0 !important; }
        .cl-headerTitle, .cl-headerSubtitle, .cl-header { display: none !important; }

        .cl-socialButtonsBlockButton {
            width: 100% !important;
            background: var(--bg2) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            border-radius: 12px !important;
            font-family: 'DM Sans', sans-serif !important;
            font-weight: 500 !important;
            height: 48px !important;
            transition: all 0.2s !important;
        }
        .cl-socialButtonsBlockButton:hover {
            background: rgba(175,200,173,0.18) !important;
            border-color: var(--green2) !important;
        }

        .cl-formField, .cl-formFieldRow { width: 100% !important; }
        .cl-formFieldInputShowPasswordButton { color: var(--text2) !important; }
        .cl-formFieldInput {
            width: 100% !important;
            background: var(--bg2) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            border-radius: 12px !important;
            font-family: 'DM Sans', sans-serif !important;
            height: 48px !important;
            padding: 0 14px !important;
            font-size: 0.9rem !important;
        }
        .cl-formFieldInput:focus {
            border-color: var(--green2) !important;
            box-shadow: 0 0 0 3px rgba(175,200,173,0.22) !important;
            outline: none !important;
            background: var(--card) !important;
        }
        .cl-formFieldLabel {
            color: var(--text2) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-size: 0.85rem !important;
        }

        .cl-formButtonPrimary {
            width: 100% !important;
            background: var(--green) !important;
            border-radius: 100px !important;
            box-shadow: 0 3px 16px rgba(175,200,173,0.38) !important;
            font-family: 'DM Sans', sans-serif !important;
            font-weight: 600 !important;
            height: 48px !important;
            color: var(--text) !important;
            font-size: 0.9rem !important;
            letter-spacing: 0.3px !important;
            border: none !important;
            transition: all 0.22s !important;
        }
        .cl-formButtonPrimary:hover {
            background: var(--green2) !important;
            box-shadow: 0 6px 22px rgba(143,181,141,0.4) !important;
        }

        .cl-dividerLine { background: var(--border2) !important; }
        .cl-dividerText { color: var(--text2) !important; font-family: 'DM Sans', sans-serif !important; }
        .cl-footerActionText { color: var(--text2) !important; font-family: 'DM Sans', sans-serif !important; }
        .cl-footerActionLink { color: var(--green-deep) !important; font-weight: 600 !important; }
        .cl-footer { display: block !important; }
        .cl-footerPages { display: block !important; }
        .cl-footerAction { text-align: center !important; margin-top: 16px !important; }
        .cl-footerActionText { font-size: 0.88rem !important; }
        .cl-footerActionLink:hover { text-decoration: underline !important; }
        [class*="cl-powered"] { display: none !important; }
        [class*="cl-branded"] { display: none !important; }
    </style>
</head>
<body>
    <div class="bg-anim"><div class="bg-grid"></div><div class="bg-orb bg-orb-1"></div><div class="bg-orb bg-orb-2"></div></div>
    <div class="wrap">
        <a href="/" class="back">← Kembali</a>
        <div class="card card-glow" style="overflow:visible; width:100%;">
            <div class="card-header">
                <div class="zn-logo">
                    <div class="zn-logo-icon">Z</div>
                    <div class="zn-logo-text">ZenoStore</div>
                </div>
                <h1 class="card-title">Selamat Datang</h1>
                <p class="card-sub">Masuk ke akun kamu</p>
            </div>
            <div id="clerk-signin"></div>
        </div>
    </div>

    <script>
        window.addEventListener('load', async () => {
            await window.Clerk.load();
            if (window.Clerk.user) { location.href = '/dashboard'; return; }
            window.Clerk.mountSignIn(document.getElementById('clerk-signin'), {
                afterSignInUrl: '/dashboard',
                signUpUrl: '/register',
                appearance: {
                    variables: {
                        colorPrimary: '#8FB58D',
                        colorBackground: 'transparent',
                        colorText: '#3A2E24',
                        colorTextSecondary: '#7A6655',
                        colorInputBackground: '#F6EBD9',
                        colorInputText: '#3A2E24',
                        borderRadius: '12px',
                        fontFamily: "'DM Sans', sans-serif",
                        fontSizeSm: '0.85rem',
                        fontSizeBase: '0.9rem',
                        spacingUnit: '1rem',
                    },
                    elements: {}
                }
            });
        });
    </script>
    <script src="/navbar.js"></script>
    <script>initNavbar('login');</script>
    <script src="/zenodialog.js"></script>
</body>
</html>
